<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pé com Pé - Retirada de Alunos</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 30px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h1>📲 Retirada sem filas</h1>

<input type="text" id="nome" placeholder="Nome do aluno">
<br>
<button onclick="cheguei()">Estou chegando</button>

<h2>Fila:</h2>
<div id="fila"></div>

<script>
  let fila = [];

  function cheguei() {
    const nome = document.getElementById("nome").value;

    if (!nome) {
      alert("Digite o nome!");
      return;
    }

    fila.push(nome);
    atualizarFila();

    document.getElementById("nome").value = "";
  }

  function atualizarFila() {
    const div = document.getElementById("fila");
    div.innerHTML = "";

    fila.forEach((nome, index) => {
      div.innerHTML += `
        <div class="card">
          ${index + 1}º - ${nome}
        </div>
      `;
    });
  }
</script>

</body>
</html>
